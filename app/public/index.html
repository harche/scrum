<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrum Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="2" width="20" height="20" rx="6" stroke="#C4704B" stroke-width="1.8"/>
          <circle cx="8" cy="9" r="1.5" fill="#C4704B"/>
          <circle cx="12" cy="9" r="1.5" fill="#8C8C86"/>
          <circle cx="16" cy="9" r="1.5" fill="#C4704B"/>
          <rect x="7" y="13" width="10" height="1.5" rx="0.75" fill="#C4704B" opacity="0.4"/>
          <rect x="7" y="16" width="7" height="1.5" rx="0.75" fill="#8C8C86" opacity="0.3"/>
        </svg>
        <h1>Scrum Dashboard</h1>
      </div>
      <select id="team-selector">
        <option value="Node Devices">Node Devices (DRA)</option>
        <option value="Node Core">Node Core</option>
      </select>
      <div class="cmd-search-wrapper">
        <input id="cmd-search" type="text" placeholder="Search commands..." autocomplete="off" spellcheck="false">
        <div id="cmd-dropdown" class="cmd-dropdown hidden"></div>
      </div>
    </header>

    <div id="main-container">
      <aside id="history-panel">
        <div class="history-header">
          <h2>Chats</h2>
          <button id="new-chat-btn" title="New Chat">+ New</button>
        </div>
        <div id="conversation-list"></div>
      </aside>

      <main id="chat-area">
        <div id="messages">
          <div class="welcome">
            <h2>Scrum Master Dashboard</h2>
            <p>Chat with your scrum assistant or search commands above.</p>
            <p class="welcome-hint">Press <kbd>/</kbd> or <kbd>Cmd+K</kbd> to search commands, or just type in the chat.</p>
          </div>
        </div>
        <form id="chat-form">
          <textarea id="user-input" placeholder="Ask about sprint status, bugs, team workload..." rows="2"></textarea>
          <button type="submit" id="send-btn">Send</button>
          <button type="button" id="stop-btn" class="hidden">Stop</button>
        </form>
      </main>
    </div>
  </div>

  <script src="markdown.js"></script>
  <script src="components.js"></script>
  <script src="history.js"></script>
  <script src="app.js"></script>
  <script src="commands.js"></script>
</body>
</html>
